<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Axiotrix | Get seen. Get chosen.</title>
  <meta name="description" content="Axiotrix builds websites, tools, reports, automation and WhatsApp systems that make small businesses impossible to miss online.">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div id="app"></div>

  <script src="assets/content.js"></script>
  <script src="assets/site.js"></script>
  <script>
    const C = window.axContent, I = window.axIcon;

    const services = C.services.map(s => `
      <a class="card reveal" href="service.html?s=${s.slug}">
        <div class="ic">${I(s.icon)}</div>
        <h3>${s.eyebrow}</h3>
        <p>${s.text}</p>
        ${s.impact ? `<div class="impact" style="margin-top:16px">${I('bolt')}<div><b>Impact</b><span>${s.impact}</span></div></div>` : ''}
        <span class="more">See the use cases ${I('arrow')}</span>
      </a>`).join("");

    const stats = C.home.stats.map(s => `
      <div class="stat reveal"><b>${s.n}</b><span>${s.l}</span></div>`).join("");

    const heroJourney = `
      <div class="journey">
        <div class="j-step">
          <span class="j-cap">1 · A customer searches</span>
          <div class="j-card j-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <span>customised curtains near me</span>
          </div>
        </div>
        <div class="j-line"></div>
        <div class="j-step">
          <span class="j-cap">2 · They find you, not a competitor</span>
          <div class="j-card j-site">
            <div class="j-site-bar"><span></span><span></span><span></span><em>yourbusiness.in</em></div>
            <div class="j-site-body">
              <b>Made-to-measure curtains, fitted in 7 days</b>
              <span class="j-btn">Book a free site visit</span>
            </div>
          </div>
        </div>
        <div class="j-line"></div>
        <div class="j-step">
          <span class="j-cap">3 · They book, hands-free for you</span>
          <div class="j-card j-chat">
            <div class="j-bubble in">Need blinds for 4 windows. Can you visit this week?</div>
            <div class="j-bubble out">Visit booked for tomorrow, 11 am. See you!</div>
          </div>
        </div>
        <div class="j-badge">${I('bolt')} Lead saved, follow-up scheduled, nothing on your plate</div>
      </div>`;

    document.getElementById('app').innerHTML = `
      ${window.axHeader('')}

      <section class="hero"><div class="wrap"><div class="hero-grid">
        <div class="reveal">
          <span class="eyebrow">${C.home.heroEyebrow}</span>
          <h1>${C.home.heroTitle}</h1>
          <p class="lead">${C.home.heroText}</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="submit.html">${C.home.heroCtaPrimary} ${I('arrow')}</a>
            <a class="btn btn-ghost" href="#services">${C.home.heroCtaSecondary}</a>
          </div>
          <div class="hero-note">${I('checkc')} ${C.home.heroNote}</div>
        </div>
        <div class="reveal">
          ${heroJourney}
        </div>
      </div></div></section>

      <section class="section-sm soft"><div class="wrap">
        <div class="stats">${stats}</div>
      </div></section>

      <section class="section" id="services"><div class="wrap">
        <div class="sh center"><span class="eyebrow">${C.home.servicesEyebrow}</span>
          <h2>${C.home.servicesTitle}</h2>
          <p class="lead">${C.home.servicesText}</p></div>
        <div class="grid grid-3">${services}</div>
      </div></section>

      <section class="section soft"><div class="wrap"><div class="grid grid-2" style="gap:56px;align-items:center">
        <div class="reveal"><span class="eyebrow">${C.home.whyEyebrow}</span>
          <h2 style="margin-bottom:16px">${C.home.whyTitle}</h2>
          <p class="lead" style="margin-bottom:26px">${C.home.whyText}</p>
          <ul class="checks">
            <li>${I('checkc')}<span>Human intervention is precious. The system handles the repeating work; you step in only where it pays.</span></li>
            <li>${I('checkc')}<span>Built around your customer's next action, not decoration.</span></li>
            <li>${I('checkc')}<span>You own everything. No lock-in, no ransom, no vendor to chase.</span></li>
          </ul>
        </div>
        <div class="reveal"><div class="grid grid-2" style="gap:16px">
          <div class="card" style="padding:20px"><div class="ic" style="margin-bottom:12px">${I('shield')}</div><h3 style="font-size:1.02rem;margin-bottom:4px">You own it all</h3><p style="font-size:.88rem">Code, data, accounts</p></div>
          <div class="card" style="padding:20px"><div class="ic" style="margin-bottom:12px">${I('clock')}</div><h3 style="font-size:1.02rem;margin-bottom:4px">First draft in 48h</h3><p style="font-size:.88rem">See it before you commit</p></div>
          <div class="card" style="padding:20px"><div class="ic" style="margin-bottom:12px">${I('bolt')}</div><h3 style="font-size:1.02rem;margin-bottom:4px">Runs without you</h3><p style="font-size:.88rem">Automations never sleep</p></div>
          <div class="card" style="padding:20px"><div class="ic" style="margin-bottom:12px">${I('star')}</div><h3 style="font-size:1.02rem;margin-bottom:4px">One partner</h3><p style="font-size:.88rem">Websites to WhatsApp</p></div>
        </div></div>
      </div></div></section>

      ${window.axCta()}
      ${window.axFooter()}
    `;
    window.axReveal();
  </script>
</body>
</html>
